
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Inter',sans-serif;}
body{background:#f0f2f8;}
.wrap{display:flex;justify-content:center;align-items:flex-start;padding:20px 0;min-height:100vh;background:#f0f2f8;}
.phone{width:390px;height:820px;border-radius:48px;overflow:hidden;position:relative;background:#fff;box-shadow:0 0 0 1px rgba(100,120,180,0.15);}

/* TOP BAR */
.topbar{position:absolute;top:0;left:0;right:0;z-index:30;padding:54px 16px 10px;background:linear-gradient(to bottom,rgba(255,255,255,1) 70%,rgba(255,255,255,0));}
.logo-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.logo{font-size:24px;font-weight:800;letter-spacing:-0.8px;color:#1a1d3a;}
.logo span{color:#5b6cde;}
.logo-dot{width:7px;height:7px;background:#5b6cde;border-radius:50%;display:inline-block;margin-left:2px;vertical-align:middle;}
.icon-btn{width:38px;height:38px;background:#f4f5ff;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.searchbar{background:#f4f5ff;border-radius:16px;padding:11px 14px;display:flex;align-items:center;gap:9px;margin-bottom:10px;cursor:pointer;}
.searchbar span{font-size:13px;color:#9095b0;flex:1;}
.filter-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:1px;}
.filter-scroll::-webkit-scrollbar{display:none;}
.chip{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:50px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:1.5px solid #e8eaf5;background:#fff;color:#6e74a0;transition:all .18s;}
.chip.active{background:#5b6cde;border-color:#5b6cde;color:#fff;}
.chip svg{flex-shrink:0;}

/* MAP */
.map-area{position:absolute;inset:0;overflow:hidden;background:#e8ecf5;cursor:grab;}
.map-area:active{cursor:grabbing;}
canvas#mapCanvas{position:absolute;top:0;left:0;image-rendering:pixelated;}

/* FLOATING UI */
.zoom-ctrl{position:absolute;right:16px;top:50%;transform:translateY(-50%);z-index:20;display:flex;flex-direction:column;background:#fff;border-radius:14px;overflow:hidden;border:1px solid #eaecf8;}
.zbtn{width:40px;height:40px;background:#fff;border:none;font-size:22px;font-weight:300;color:#3d4480;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.zbtn:first-child{border-bottom:1px solid #eaecf8;}
.zbtn:hover{background:#f4f5ff;}
.count-pill{position:absolute;left:16px;bottom:108px;z-index:20;background:#5b6cde;color:#fff;border-radius:20px;padding:8px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;}
.cpulse{width:7px;height:7px;background:rgba(255,255,255,0.7);border-radius:50%;}
.post-btn{position:absolute;right:16px;bottom:108px;z-index:20;width:52px;height:52px;background:#5b6cde;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* LISTING CARD */
.card-sheet{position:absolute;bottom:0;left:0;right:0;z-index:40;transition:transform .3s cubic-bezier(.4,0,.2,1);transform:translateY(100%);}
.card-sheet.open{transform:translateY(0);}
.card-inner{background:#fff;border-radius:28px 28px 0 0;overflow:hidden;}
.drag-bar{width:36px;height:4px;background:#e4e6f5;border-radius:4px;margin:12px auto 0;}
.card-img{height:190px;background:#eef0ff;display:flex;align-items:center;justify-content:center;margin:14px 16px 0;border-radius:20px;overflow:hidden;position:relative;}
.card-img-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.avail-badge{position:absolute;top:12px;left:12px;background:rgba(255,255,255,0.95);border-radius:20px;padding:5px 11px;font-size:11px;font-weight:700;color:#3cb87a;display:flex;align-items:center;gap:5px;}
.avail-dot{width:6px;height:6px;background:#3cb87a;border-radius:50%;}
.time-badge{position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.9);border-radius:20px;padding:5px 11px;font-size:11px;color:#8087b0;font-weight:500;}
.card-body{padding:14px 16px 16px;}
.card-title{font-size:20px;font-weight:800;color:#1a1d3a;letter-spacing:-0.4px;margin-bottom:3px;}
.card-meta{font-size:12px;color:#9095b0;margin-bottom:10px;font-weight:500;}
.card-desc{font-size:13px;color:#6e74a0;line-height:1.55;margin-bottom:12px;}
.tags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.tag{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;}
.tag-free{background:#eef8f3;color:#3cb87a;}
.tag-cat{background:#f0f1ff;color:#5b6cde;}
.tag-cond{background:#f8f4ff;color:#8b6cde;}
.card-actions{display:flex;gap:9px;}
.btn-close{width:46px;height:46px;background:#f4f5ff;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6e74a0;font-size:16px;font-weight:500;}
.btn-claim{flex:1;background:#5b6cde;color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:-0.2px;}
.btn-heart{width:46px;height:46px;background:#f4f5ff;border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* NAV */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;z-index:35;background:#fff;border-top:1px solid #eaecf5;display:flex;padding:10px 0 28px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none;padding:0;}
.nav-label{font-size:10px;font-weight:600;color:#c0c4df;letter-spacing:0.2px;}
.nav-item.active .nav-label{color:#5b6cde;}

/* UPLOAD SHEET */
.upload-sheet{position:absolute;inset:0;z-index:50;background:#fff;transition:transform .3s cubic-bezier(.4,0,.2,1);transform:translateY(100%);}
.upload-sheet.open{transform:translateY(0);}
.upload-inner{padding:54px 20px 20px;display:flex;flex-direction:column;height:100%;}
.up-header{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.back-btn{width:38px;height:38px;background:#f4f5ff;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.up-title{font-size:20px;font-weight:800;color:#1a1d3a;}
.photo-drop{border:2px dashed #d0d3f0;border-radius:22px;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;cursor:pointer;background:#fafbff;}
.photo-drop p{font-size:13px;color:#9095b0;font-weight:500;}
.form-row{display:flex;gap:10px;margin-bottom:14px;}
.form-group{flex:1;display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;font-weight:700;color:#9095b0;letter-spacing:0.4px;text-transform:uppercase;}
.form-select,.form-input{border:1.5px solid #e8eaf5;border-radius:12px;padding:11px 13px;font-size:13px;color:#1a1d3a;background:#fafbff;-webkit-appearance:none;outline:none;}
.loc-pill{background:#f4f5ff;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:20px;font-size:13px;color:#5b6cde;font-weight:600;}
.btn-post{background:#5b6cde;color:#fff;border:none;border-radius:16px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;margin-top:auto;}
</style>

function getVisiblePins(){
  const visible=activeFilter==='all'?listings:listings.filter(p=>p.cat===activeFilter);
  if(zoom>=1.3)return visible;
  if(zoom>=0.9)return visible.filter((_,i)=>i%2===0);
  if(zoom>=0.7)return visible.filter((_,i)=>i%3===0);
  return visible.filter((_,i)=>i%4===0);
}

function worldToScreen(wx,wy){return{sx:wx*zoom+panX,sy:wy*zoom+panY};}
function screenToWorld(sx,sy){return{wx:(sx-panX)/zoom,wy:(sy-panY)/zoom};}

function drawMap(){
  ctx.clearRect(0,0,W,H);
  ctx.save();ctx.translate(panX,panY);ctx.scale(zoom,zoom);

  // Base
  ctx.fillStyle='#e9ecf7';ctx.fillRect(-500,-500,W+1000,H+1000);

  // Parks
  [{x:60,y:80,w:80,h:200},{x:240,y:380,w:60,h:90},{x:300,y:130,w:50,h:70}].forEach(p=>{
    ctx.fillStyle='#d0dfc0';roundRect(p.x,p.y,p.w,p.h,8);ctx.fill();
  });

  // Water
  ctx.fillStyle='#c2d4ea';roundRect(160,580,100,120,6);ctx.fill();

  // Major roads
  const roads=[
    {x1:0,y1:160,x2:390,y2:160,w:20},{x1:0,y1:300,x2:390,y2:300,w:20},
    {x1:0,y1:440,x2:390,y2:440,w:20},{x1:0,y1:560,x2:390,y2:560,w:16},
    {x1:50,y1:0,x2:50,y2:820,w:16},{x1:160,y1:0,x2:160,y2:820,w:16},
    {x1:280,y1:0,x2:280,y2:820,w:16},{x1:360,y1:0,x2:360,y2:820,w:14},
  ];
  roads.forEach(r=>{
    ctx.strokeStyle='#cdd0e3';ctx.lineWidth=r.w;
    ctx.beginPath();ctx.moveTo(r.x1,r.y1);ctx.lineTo(r.x2,r.y2);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=r.w-5;
    ctx.beginPath();ctx.moveTo(r.x1,r.y1);ctx.lineTo(r.x2,r.y2);ctx.stroke();
  });

  // Minor roads
  const minor=[
    {x1:0,y1:220,x2:390,y2:220,w:10},{x1:0,y1:370,x2:390,y2:370,w:10},
    {x1:0,y1:500,x2:390,y2:500,w:10},{x1:110,y1:0,x2:110,y2:820,w:10},
    {x1:220,y1:0,x2:220,y2:820,w:10},{x1:320,y1:0,x2:320,y2:820,w:10},
  ];
  minor.forEach(r=>{
    ctx.strokeStyle='#d8dae8';ctx.lineWidth=r.w;
    ctx.beginPath();ctx.moveTo(r.x1,r.y1);ctx.lineTo(r.x2,r.y2);ctx.stroke();
    ctx.strokeStyle='#fff';ctx.lineWidth=r.w-4;
    ctx.beginPath();ctx.moveTo(r.x1,r.y1);ctx.lineTo(r.x2,r.y2);ctx.stroke();
  });

  // Blocks
  const blocks=[
    {x:55,y:165,w:50,h:50},{x:115,y:165,w:40,h:50},{x:165,y:165,w:110,h:50},
    {x:285,y:165,w:70,h:50},{x:365,y:165,w:20,h:50},
    {x:55,y:225,w:50,h:70},{x:115,y:225,w:40,h:70},{x:165,y:225,w:110,h:70},
    {x:285,y:225,w:30,h:70},{x:325,y:225,w:30,h:70},{x:365,y:225,w:20,h:70},
    {x:55,y:305,w:50,h:60},{x:115,y:305,w:40,h:60},{x:165,y:305,w:110,h:60},
    {x:285,y:305,w:70,h:60},{x:365,y:305,w:20,h:60},
    {x:55,y:375,w:50,h:60},{x:115,y:375,w:40,h:60},{x:165,y:375,w:110,h:60},
    {x:285,y:375,w:70,h:60},{x:365,y:375,w:20,h:60},
    {x:55,y:445,w:100,h:50},{x:165,y:445,w:110,h:50},{x:285,y:445,w:70,h:50},
    {x:55,y:505,w:100,h:50},{x:165,y:505,w:110,h:50},{x:285,y:505,w:30,h:50},
  ];
  blocks.forEach(b=>{
    ctx.fillStyle='#dde0ee';roundRect(b.x+3,b.y+3,b.w-6,b.h-6,3);ctx.fill();
    ctx.fillStyle='#d0d3e4';
    roundRect(b.x+7,b.y+7,b.w-14,(b.h-14)*0.45,2);ctx.fill();
    roundRect(b.x+7,b.y+7+(b.h-14)*0.55,(b.w-14)*0.55,(b.h-14)*0.45,2);ctx.fill();
  });

  ctx.restore();
  drawPins();
  drawUser();
}

function roundRect(x,y,w,h,r){
  if(w<=0||h<=0)return;
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawCatIcon(ctx,cat,cx,cy,sz,color){
  ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=1.5;ctx.lineCap='round';ctx.lineJoin='round';
  const h=sz/2;
  if(cat==='furniture'){
    ctx.strokeStyle=color;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.roundRect(cx-h*0.9,cy-h*0.1,h*1.8,h*0.7,2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-h*0.6,cy-h*0.1);ctx.lineTo(cx-h*0.6,cy-h*0.55);ctx.quadraticCurveTo(cx-h*0.6,cy-h*0.8,cx-h*0.1,cy-h*0.8);ctx.lineTo(cx+h*0.1,cy-h*0.8);ctx.quadraticCurveTo(cx+h*0.6,cy-h*0.8,cx+h*0.6,cy-h*0.55);ctx.lineTo(cx+h*0.6,cy-h*0.1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-h*0.7,cy+h*0.6);ctx.lineTo(cx-h*0.7,cy+h*0.9);ctx.moveTo(cx+h*0.7,cy+h*0.6);ctx.lineTo(cx+h*0.7,cy+h*0.9);ctx.stroke();
  }else if(cat==='lighting'){
    ctx.beginPath();ctx.arc(cx,cy-h*0.3,h*0.55,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-h*0.3,cy+h*0.25);ctx.lineTo(cx+h*0.3,cy+h*0.25);ctx.moveTo(cx-h*0.2,cy+h*0.55);ctx.lineTo(cx+h*0.2,cy+h*0.55);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,cy-h*0.85);ctx.lineTo(cx,cy-h*1.0);ctx.stroke();
  }else if(cat==='decor'){
    ctx.beginPath();ctx.moveTo(cx,cy-h*0.9);ctx.bezierCurveTo(cx+h*0.8,cy-h*0.4,cx+h*0.8,cy+h*0.5,cx,cy+h*0.9);ctx.bezierCurveTo(cx-h*0.8,cy+h*0.5,cx-h*0.8,cy-h*0.4,cx,cy-h*0.9);ctx.stroke();
  }else if(cat==='appliances'){
    ctx.beginPath();ctx.roundRect(cx-h*0.8,cy-h*0.7,h*1.6,h*1.5,2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-h*0.8,cy-h*0.2);ctx.lineTo(cx+h*0.8,cy-h*0.2);ctx.stroke();
    ctx.beginPath();ctx.arc(cx+h*0.5,cy-h*0.5,h*0.15,0,Math.PI*2);ctx.fill();
  }else if(cat==='clothing'){
    ctx.beginPath();ctx.moveTo(cx-h*0.7,cy-h*0.5);ctx.lineTo(cx-h*0.3,cy-h*0.8);ctx.quadraticCurveTo(cx,cy-h*0.5,cx+h*0.3,cy-h*0.8);ctx.lineTo(cx+h*0.7,cy-h*0.5);ctx.lineTo(cx+h*0.55,cy-h*0.1);ctx.lineTo(cx+h*0.55,cy+h*0.9);ctx.lineTo(cx-h*0.55,cy+h*0.9);ctx.lineTo(cx-h*0.55,cy-h*0.1);ctx.closePath();ctx.stroke();
  }else if(cat==='books'){
    ctx.beginPath();ctx.roundRect(cx-h*0.7,cy-h*0.8,h*0.55,h*1.6,2);ctx.stroke();
    ctx.beginPath();ctx.roundRect(cx-h*0.1,cy-h*0.8,h*0.5,h*1.6,2);ctx.stroke();
    ctx.beginPath();ctx.roundRect(cx+h*0.45,cy-h*0.6,h*0.4,h*1.4,2);ctx.stroke();
  }
}

function drawPins(){
  const pins=getVisiblePins();
  pins.forEach(p=>{
    const{sx,sy}=worldToScreen(p.x,p.y);
    if(sx<-40||sx>W+40||sy<-40||sy>H+40)return;
    const r=20;const col=CAT_COLORS[p.cat]||'#5b6cde';const bg=CAT_BG[p.cat]||'#eef0ff';
    const isSelected=selectedPin&&selectedPin.id===p.id;
    const scale=isSelected?1.2:1;
    ctx.save();ctx.translate(sx,sy);ctx.scale(scale,scale);
    // shadow
    ctx.fillStyle='rgba(80,90,160,0.18)';
    ctx.beginPath();ctx.ellipse(0,r*0.7+10,r*0.6,r*0.25,0,0,Math.PI*2);ctx.fill();
    // bubble
    ctx.fillStyle=isSelected?col:bg;
    ctx.strokeStyle=col;ctx.lineWidth=isSelected?0:1.5;
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);
    if(ctx.roundRect){}
    ctx.fill();if(!isSelected)ctx.stroke();
    // tail
    ctx.fillStyle=isSelected?col:bg;
    ctx.strokeStyle=col;ctx.lineWidth=isSelected?0:1.5;
    ctx.beginPath();ctx.moveTo(-6,r-4);ctx.lineTo(0,r+10);ctx.lineTo(6,r-4);
    ctx.fill();if(!isSelected)ctx.stroke();
    // icon
    drawCatIcon(ctx,p.cat,0,-1,r*1.1,isSelected?'white':col);
    ctx.restore();
  });
}

function drawUser(){
  const ux=195*zoom+panX,uy=360*zoom+panY;
  ctx.fillStyle='rgba(91,108,222,0.15)';
  ctx.beginPath();ctx.arc(ux,uy,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#5b6cde';
  ctx.beginPath();ctx.arc(ux,uy,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.lineWidth=2.5;ctx.strokeStyle='white';
  ctx.beginPath();ctx.arc(ux,uy,9,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#5b6cde';ctx.beginPath();ctx.arc(ux,uy,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(ux,uy,4,0,Math.PI*2);ctx.fill();
}

function hitTest(ex,ey){
  const pins=getVisiblePins();
  for(let i=pins.length-1;i>=0;i--){
    const p=pins[i];const{sx,sy}=worldToScreen(p.x,p.y);
    if(Math.hypot(ex-sx,ey-sy)<28)return p;
  }
  return null;
}

function updateCount(){
  const pins=getVisiblePins();
  const vis=pins.filter(p=>{const{sx,sy}=worldToScreen(p.x,p.y);return sx>0&&sx<W&&sy>80&&sy<H-80;});
  document.getElementById('countText').textContent=vis.length+' nearby';
}

function openCard(p){
  selectedPin=p;
  document.getElementById('cName').textContent=p.name;
  document.getElementById('cMeta').textContent=p.dist+' away · '+p.neighborhood;
  document.getElementById('cDesc').textContent=p.desc;
  document.getElementById('cCat').textContent=p.cat.charAt(0).toUpperCase()+p.cat.slice(1);
  document.getElementById('cCond').textContent=p.cond+' condition';
  document.getElementById('cTime').textContent=p.time;
  const bg=CAT_BG[p.cat]||'#eef0ff';const col=CAT_COLORS[p.cat]||'#5b6cde';
  const inner=document.getElementById('cardImgInner');
  inner.innerHTML='';
  const cv=document.createElement('canvas');cv.width=358;cv.height=190;
  inner.appendChild(cv);
  const c=cv.getContext('2d');
  c.fillStyle=bg;c.fillRect(0,0,358,190);
  c.strokeStyle=col;c.fillStyle=col;c.lineWidth=3;c.lineCap='round';c.lineJoin='round';
  drawCatIcon(c,p.cat,179,95,90,col);
  document.getElementById('cardSheet').classList.add('open');
  drawMap();
}

document.getElementById('closeCard').onclick=()=>{
  selectedPin=null;
  document.getElementById('cardSheet').classList.remove('open');
  drawMap();
};

// Map interactions
const mapArea=document.getElementById('mapArea');
mapArea.addEventListener('mousedown',e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  const hit=hitTest(mx,my);
  if(hit){openCard(hit);return;}
  isDragging=true;dragStartX=e.clientX;dragStartY=e.clientY;panStartX=panX;panStartY=panY;
});
window.addEventListener('mousemove',e=>{
  if(!isDragging)return;
  panX=panStartX+(e.clientX-dragStartX);panY=panStartY+(e.clientY-dragStartY);
  clampPan();drawMap();updateCount();
});
window.addEventListener('mouseup',()=>isDragging=false);

mapArea.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  doZoom(-e.deltaY*0.0008,mx,my);
},{passive:false});

mapArea.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    const t=e.touches[0];const r=canvas.getBoundingClientRect();
    const mx=(t.clientX-r.left)*(W/r.width),my=(t.clientY-r.top)*(H/r.height);
    const hit=hitTest(mx,my);
    if(hit){openCard(hit);return;}
    isDragging=true;dragStartX=t.clientX;dragStartY=t.clientY;panStartX=panX;panStartY=panY;lastPinchDist=null;
  }else if(e.touches.length===2){isDragging=false;lastPinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
mapArea.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(lastPinchDist){const r=canvas.getBoundingClientRect();const cx=((e.touches[0].clientX+e.touches[1].clientX)/2-r.left)*(W/r.width);const cy=((e.touches[0].clientY+e.touches[1].clientY)/2-r.top)*(H/r.height);doZoom((d-lastPinchDist)*0.005,cx,cy);}
    lastPinchDist=d;
  }else if(isDragging&&e.touches.length===1){
    const t=e.touches[0];panX=panStartX+(t.clientX-dragStartX);panY=panStartY+(t.clientY-dragStartY);clampPan();drawMap();updateCount();
  }
},{passive:false});
mapArea.addEventListener('touchend',()=>{isDragging=false;lastPinchDist=null;},{passive:true});

function doZoom(delta,cx,cy){
  const nz=Math.min(2.6,Math.max(0.5,zoom+delta));
  panX=cx-(cx-panX)*(nz/zoom);panY=cy-(cy-panY)*(nz/zoom);
  zoom=nz;clampPan();drawMap();updateCount();
}
function clampPan(){
  const minPx=W-W*zoom*1.5,maxPx=W*zoom*0.5;
  const minPy=H-H*zoom*1.5,maxPy=H*zoom*0.5;
  panX=Math.min(maxPx,Math.max(minPx,panX));panY=Math.min(maxPy,Math.max(minPy,panY));
}

document.getElementById('btnZoomIn').onclick=()=>doZoom(0.2,W/2,H/2);
document.getElementById('btnZoomOut').onclick=()=>doZoom(-0.2,W/2,H/2);

// Filters
document.getElementById('filterRow').addEventListener('click',e=>{
  const chip=e.target.closest('.chip');if(!chip)return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  activeFilter=chip.dataset.f;
  selectedPin=null;
  document.getElementById('cardSheet').classList.remove('open');
  drawMap();updateCount();
});

// Upload
document.getElementById('postBtn').onclick=()=>document.getElementById('uploadSheet').classList.add('open');
document.getElementById('closeUpload').onclick=()=>document.getElementById('uploadSheet').classList.remove('open');
document.getElementById('doPost').onclick=()=>document.getElementById('uploadSheet').classList.remove('open');

// Nav
document.querySelectorAll('.nav-item').forEach(n=>{
  n.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(x=>{x.classList.remove('active');x.querySelector('.nav-label').style.color='';});
    n.classList.add('active');n.querySelector('.nav-label').style.color='#5b6cde';
  });
});

drawMap();updateCount();
</script>
